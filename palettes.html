<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="基于 742 个中国传统色和 12 种配色关系的筛选与复制工具。">
    <meta name="theme-color" content="#f7f7f4" data-theme-color>
    <title>中国色配色灵感 - 中国传统配色</title>
    <link rel="icon" href="favicon.svg?v=20260611-1" type="image/svg+xml">
    <script>
      (() => {
        try {
          const theme = localStorage.getItem('theme');
          if (theme === 'dark' || theme === 'light') {
            document.documentElement.dataset.theme = theme;
          }
        } catch (error) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700&family=Noto+Serif+SC:wght@600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/palettes.css?v=20260612-5">
    <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js" defer></script>
  </head>
  <body data-current-page="palettes">
    <a class="skip-link" href="#palette-grid">跳到配色列表</a>

    <div data-shared-header></div>

    <main class="palette-shell">
      <aside class="palette-rail" aria-label="配色筛选">
        <div class="rail-block">
          <span class="rail-title">浏览方式</span>
          <div class="rail-options" data-feed-list></div>
        </div>
        <div class="rail-block">
          <span class="rail-title">配色关系</span>
          <div class="rail-options rail-options--dense" data-relation-list></div>
        </div>
        <div class="rail-block">
          <span class="rail-title">色彩气质</span>
          <div class="rail-options rail-options--dense" data-tone-list></div>
        </div>
      </aside>

      <section class="palette-main" aria-labelledby="palette-title">
        <div class="palette-hero">
          <span class="eyebrow">742 色 · 12 种关系</span>
          <h1 id="palette-title">中国色配色灵感</h1>
          <p>筛选、复制、收藏配色。</p>
        </div>

        <div class="palette-toolbar" aria-label="配色工具栏">
          <label class="palette-search">
            <span class="sr-only">搜索配色</span>
            <iconify-icon icon="lucide:search" aria-hidden="true"></iconify-icon>
            <input type="search" data-search placeholder="搜索色名 / 编号 / HEX" autocomplete="off">
          </label>
          <button class="toolbar-button" type="button" data-shuffle>
            <iconify-icon icon="lucide:shuffle" aria-hidden="true"></iconify-icon>
            换一批
          </button>
          <button class="toolbar-button" type="button" data-copy-selected>
            <iconify-icon icon="lucide:copy" aria-hidden="true"></iconify-icon>
            复制当前
          </button>
          <button class="toolbar-button" type="button" data-export-favorites hidden disabled>
            <iconify-icon icon="lucide:download" aria-hidden="true"></iconify-icon>
            导出收藏
          </button>
        </div>

        <div class="palette-meta">
          <span data-result-count>正在读取配色</span>
          <span>点卡片选当前</span>
        </div>

        <div class="palette-grid" id="palette-grid" data-palette-grid></div>
        <div class="palette-more">
          <button class="load-button" type="button" data-load-more>
            <iconify-icon icon="lucide:chevron-down" aria-hidden="true"></iconify-icon>
            加载更多
          </button>
        </div>
      </section>

    </main>

    <div data-shared-footer></div>

    <div class="palette-toast" data-toast role="status" aria-live="polite"></div>

    <script src="assets/js/shared-chrome.js?v=20260612-1"></script>
    <script src="assets/data/images.js?v=20260610-6"></script>
    <script src="assets/data/harmonies.js?v=20260610-6"></script>
    <script src="assets/js/palettes.js?v=20260611-15" defer></script>
  </body>
</html>
