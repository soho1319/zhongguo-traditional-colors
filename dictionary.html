<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="中国传统色色彩字典，按色名、HEX 和色系浏览 742 个传统色。">
    <meta name="theme-color" content="#f7f7f4" data-theme-color>
    <title>色彩字典 - 中国传统配色</title>
    <link rel="icon" href="favicon.svg?v=20260610-6" type="image/svg+xml">
    <script>
      (() => {
        try {
          const theme = localStorage.getItem('theme');
          if (theme === 'dark' || theme === 'light') {
            document.documentElement.dataset.theme = theme;
          }
        } catch (error) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700&family=Noto+Serif+SC:wght@600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css?v=20260613-4">
    <link rel="stylesheet" href="assets/css/color-suggestions.css?v=20260614-1">
    <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js" defer></script>
  </head>
  <body data-current-page="dictionary">
    <a class="skip-link" href="#dictionary">跳到色彩字典</a>

    <div data-shared-header></div>

    <main id="top" class="dictionary-page">
      <section class="dictionary-hero" aria-labelledby="dictionary-hero-title">
        <div class="dictionary-hero-copy">
          <span class="section-kicker">742 色索引</span>
          <h1 id="dictionary-hero-title">色彩字典</h1>
          <p>把传统色拆成可扫读的单色条目：色块、色名、色值、色系和配色关系集中查看。</p>
          <dl class="dictionary-stats" aria-label="色彩字典数据">
            <div>
              <dt>742</dt>
              <dd>传统色</dd>
            </div>
            <div>
              <dt>4</dt>
              <dd>色值格式</dd>
            </div>
            <div>
              <dt>12</dt>
              <dd>配色关系</dd>
            </div>
          </dl>
        </div>
        <div class="dictionary-hero-spectrum" aria-label="传统色色谱预览">
          <span style="--swatch: #F9F4DC"></span>
          <span style="--swatch: #FED71A"></span>
          <span style="--swatch: #F97D1C"></span>
          <span style="--swatch: #ED5126"></span>
          <span style="--swatch: #C08EAF"></span>
          <span style="--swatch: #8B2671"></span>
          <span style="--swatch: #1661AB"></span>
          <span style="--swatch: #1781B5"></span>
          <span style="--swatch: #12AA9C"></span>
          <span style="--swatch: #1BA784"></span>
          <span style="--swatch: #5C3719"></span>
          <span style="--swatch: #CFCCC9"></span>
        </div>
      </section>

      <section class="dictionary-section" id="dictionary" aria-labelledby="dictionary-title">
        <div class="section-heading">
          <span class="section-kicker">Color Dictionary</span>
          <h2 id="dictionary-title">传统色索引</h2>
          <p>按色名、编号、HEX 或色系缩小范围。</p>
        </div>

        <div class="dictionary-toolbar" aria-label="色彩字典工具">
          <label class="dictionary-search">
            <span class="sr-only">检索色彩字典</span>
            <iconify-icon icon="lucide:search" aria-hidden="true"></iconify-icon>
            <input type="search" data-dictionary-search data-color-suggest placeholder="搜索色名 / 编号 / HEX" autocomplete="off">
          </label>
          <label class="dictionary-filter">
            <span class="sr-only">按色系筛选</span>
            <select data-dictionary-hue aria-label="按色系筛选">
              <option value="all">全部色系</option>
              <option value="red">红色系</option>
              <option value="orange">橙色系</option>
              <option value="yellow">黄色系</option>
              <option value="green">绿色系</option>
              <option value="cyan">青色系</option>
              <option value="blue">蓝色系</option>
              <option value="purple">紫色系</option>
              <option value="neutral">中性色</option>
            </select>
          </label>
          <button class="dictionary-random" type="button" data-dictionary-random>
            <iconify-icon icon="lucide:shuffle" aria-hidden="true"></iconify-icon>
            随机一色
          </button>
        </div>

        <div class="dictionary-count" data-dictionary-count aria-live="polite"></div>
        <div class="dictionary-grid" data-dictionary-grid></div>
      </section>
    </main>

    <dialog class="color-detail-dialog" data-color-detail-dialog>
      <button class="dialog-close color-detail-close" type="button" data-color-detail-close aria-label="关闭颜色信息">
        <iconify-icon icon="lucide:x" aria-hidden="true"></iconify-icon>
      </button>
      <div class="color-detail-hero">
        <span class="color-detail-swatch" data-color-detail-swatch aria-hidden="true"></span>
        <div>
          <span class="section-kicker" data-color-detail-kicker></span>
          <h2 data-color-detail-title></h2>
          <p data-color-detail-note></p>
        </div>
      </div>
      <div class="color-detail-body">
        <section class="color-detail-panel" aria-labelledby="color-values-title">
          <h3 id="color-values-title">色值</h3>
          <dl class="color-value-list" data-color-detail-values></dl>
        </section>
        <section class="color-detail-panel" aria-labelledby="color-profile-title">
          <h3 id="color-profile-title">信息</h3>
          <dl class="color-profile-list" data-color-detail-profile></dl>
        </section>
        <section class="color-detail-panel color-detail-panel-wide" aria-labelledby="color-related-title">
          <h3 id="color-related-title">配色关系</h3>
          <div class="color-related-list" data-color-detail-related></div>
        </section>
      </div>
      <div class="color-detail-actions">
        <span data-color-detail-status aria-live="polite"></span>
        <a class="button button-secondary" data-color-detail-download href="#" download>
          <iconify-icon icon="lucide:download" aria-hidden="true"></iconify-icon>
          下载色卡
        </a>
        <a class="button button-primary" data-color-detail-style href="#">
          <iconify-icon icon="lucide:panel-top" aria-hidden="true"></iconify-icon>
          场景试色
        </a>
      </div>
    </dialog>

    <div data-shared-footer></div>

    <script src="assets/js/shared-chrome.js?v=20260613-1" defer></script>
    <script src="assets/data/images.js?v=20260610-6" defer></script>
    <script src="assets/data/harmonies.js?v=20260610-6" defer></script>
    <script src="assets/js/color-search-suggestions.js?v=20260614-1" defer></script>
    <script src="assets/js/dictionary.js?v=20260614-1" defer></script>
  </body>
</html>
