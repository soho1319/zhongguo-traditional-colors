<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="把中国传统色生成背景与文字双色卡片，支持色名、HEX、明暗冷暖和双条件搜索。">
    <meta name="theme-color" content="#f7f7f4" data-theme-color>
    <title>用途卡片 - 中国传统配色</title>
    <link rel="icon" href="favicon.svg?v=20260611-1" type="image/svg+xml">
    <script>
      (() => {
        try {
          const theme = localStorage.getItem('theme');
          if (theme === 'dark' || theme === 'light') {
            document.documentElement.dataset.theme = theme;
          }
        } catch (error) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700&family=Noto+Serif+SC:wght@600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/palettes.css?v=20260612-6">
    <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js" defer></script>
  </head>
  <body data-current-page="uses">
    <a class="skip-link" href="#use-grid">跳到用途卡片</a>

    <div data-shared-header></div>

    <main class="use-shell use-shell--simple">
      <h1 class="sr-only">中国色文字卡片</h1>

      <section class="use-workspace use-workspace--simple" aria-labelledby="use-grid-title">
        <div class="use-main">
          <div class="use-searchbar" aria-label="用途卡片工具">
            <label class="palette-search">
              <span class="sr-only">搜索用途卡片</span>
              <iconify-icon icon="lucide:search" aria-hidden="true"></iconify-icon>
              <input type="search" data-use-search placeholder="搜索：月白 / 深色 / 冷色 / #F9F4DC / 月白 & 蓝" autocomplete="off">
            </label>
            <div class="use-modebar" data-use-modebar aria-label="切换卡片模式"></div>
            <div class="use-huebar" data-use-huebar aria-label="按色相过滤"></div>
            <label class="use-bias">
              <span>明暗倾向</span>
              <input type="range" min="0" max="100" value="50" data-use-bias aria-label="背景和文字偏好">
            </label>
            <button class="toolbar-button" type="button" data-use-shuffle>
              <iconify-icon icon="lucide:shuffle" aria-hidden="true"></iconify-icon>
              换一批
            </button>
          </div>

          <div class="palette-meta">
            <span data-use-count>正在读取用途卡片</span>
            <span>单色搜索会随机搭配第二色；用 & / + / with 指定第二色</span>
          </div>

          <h2 class="sr-only" id="use-grid-title">用途卡片列表</h2>
          <div class="use-grid" id="use-grid" data-use-grid></div>
          <div class="palette-more">
            <button class="load-button" type="button" data-use-load-more>
              <iconify-icon icon="lucide:chevron-down" aria-hidden="true"></iconify-icon>
              加载更多
            </button>
          </div>
        </div>
      </section>
    </main>

    <div data-shared-footer></div>

    <div class="palette-toast" data-toast role="status" aria-live="polite"></div>

    <script src="assets/js/shared-chrome.js?v=20260612-2"></script>
    <script src="assets/data/images.js?v=20260610-6"></script>
    <script src="assets/data/harmonies.js?v=20260610-6"></script>
    <script src="assets/js/uses.js?v=20260612-3" defer></script>
  </body>
</html>
