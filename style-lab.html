    <script>
      (() => {
        try {
          const theme = localStorage.getItem('theme');
          if (theme === 'dark' || theme === 'light') {
            document.documentElement.dataset.theme = theme;
          }
        } catch (error) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>

    <main id="top">
      <section class="style-lab-section" id="style-lab" aria-labelledby="style-lab-title" data-experimental="true">
        <div class="style-lab-intro">
          <div class="section-heading">
            <span class="section-kicker">场景试色</span>
            <h1 id="style-lab-title">选色，看落位</h1>

            <strong>取色来源</strong>

          </div>
        </div>

        <div class="style-lab-workbench">
          <aside class="style-lab-control" aria-label="配色应用控制台">
            <div class="style-anchor-panel">
              <span class="style-lab-label">01 选择中国色</span>
              <button class="style-anchor-card" type="button" data-style-anchor-button aria-label="切换当前中国色">
                <span class="style-anchor-swatch" data-style-anchor-swatch aria-hidden="true"></span>
                <span>
                  <strong data-style-anchor>正在读取色库</strong>
                  <small data-style-anchor-meta>默认随机一个传统色</small>

              </button>
              <label class="style-color-search">
                <span class="sr-only">搜索并切换当前中国色</span>
                <iconify-icon icon="lucide:search" aria-hidden="true"></iconify-icon>
                <input type="search" data-style-color-search list="style-color-options" placeholder="搜索色名 / 编号 / HEX" autocomplete="off">
                <datalist id="style-color-options" data-style-color-options></datalist>
              </label>
              <label class="style-format-select">
                <span>复制格式</span>
                <select data-style-format aria-label="选择复制色值类型">
                  <option value="hex">HEX</option>
                  <option value="rgb">RGB</option>
                  <option value="hsl">HSL</option>
                  <option value="cmyk">CMYK</option>
                </select>
              </label>
              <div class="style-lab-actions">
                <button class="button button-primary" type="button" data-style-refresh>
                  <iconify-icon icon="lucide:shuffle" aria-hidden="true"></iconify-icon>
                  换主色
                </button>
                <button class="button button-secondary" type="button" data-style-copy-all>
                  <iconify-icon icon="lucide:copy" aria-hidden="true"></iconify-icon>
                  复制方案

                <button class="button button-secondary" type="button" data-style-copy-css>

                  CSS 变量
                </button>
              </div>
            </div>
            <div class="style-lab-mode">
              <span class="style-lab-label">02 选择使用场景</span>
              <div class="style-mode-grid" data-style-scene-list aria-label="选择使用场景"></div>
              <p class="style-mode-summary" data-style-scene-summary></p>
              <div class="style-intent-grid" data-style-intent-list aria-label="选择方案倾向"></div>
            </div>
            <div class="style-lab-readiness" data-style-readiness aria-label="当前配色可用性"></div>
            <span class="style-lab-label style-palette-label">03 复制角色色</span>
            <div class="style-lab-palette" data-style-palette aria-label="当前样式配色色值"></div>
            <p class="style-lab-status" data-style-status aria-live="polite"></p>
          </aside>

          <div class="style-template-grid" data-style-lab aria-label="传统色配色应用实验预览"></div>

    <dialog class="style-color-dialog" data-style-color-dialog>

        <button class="dialog-close style-color-close" type="button" data-close-style-color aria-label="关闭颜色选择器">
